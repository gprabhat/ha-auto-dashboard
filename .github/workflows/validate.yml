name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # continue-on-error: hassfest's codeowners validator has an
      # unresolved upstream bug (KeyError: 'codeowners', reported since
      # May 2025) that crashes on integrations unrelated to this repo.
      # Keep the check for visibility but don't let it block CI.
      - uses: home-assistant/actions/hassfest@master
        continue-on-error: true

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands
